name: oummi
description: "OUMI - Plateforme Numerique Nationale pour la Sante Maternelle et Infantile au Tchad"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.10
  firebase_messaging: ^15.2.10
  firebase_storage: ^12.4.9

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.3

  # UI & Animations
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # Calendar
  table_calendar: ^3.2.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5

  # Voice
  speech_to_text: ^7.0.1
  flutter_tts: ^4.2.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # Google Sign In
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
